<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head title="Font matching prototype">
</head>

<style>
    @font-face {
      font-family: SHAN;
      src:url('{{hacked_font}}')format('truetype');
      font-weight:normal;
      font-style:normal;
    }
    @font-face {
      font-family:"Noto Myanmar Regular";
      src:url('{{unicode_font}}')format('truetype');
      font-weight:normal;
      font-style:normal;
    }

    {% for font in unicode_font_list%}
    @font-face {
      font-family:"{{font}}";
      src:url('{{font_base}}/unicode/{{font}}';
    }
    {% endfor %}

  .selected-cell {
    background-color: green;
  }
  .yellow-cell {
    background-color: yellow;
  }
  .unselected-cell {
    background-color: white;
  }

</style>

<style>
    .word-matrix {
      border-collapse: collapse;
      font-family: sans-serif;
      margin: 10px 0;
      margin-right: 10px;
      font-size:30px;
    }
    .word-matrix td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    caption {
      font-size: 24px;
    }

    table {
      float: left;
      padding: 15px;
      }
</style>

<script>
    // GLOBALS

    const lang_code = '{{lang_code}}';
    const lang_name = '{{lang_name}}';

    const conversion_data = {{conversion_data | tojson}};
    const latest_time_stamp = conversion_data['timestamp'];
    const date_of_last_save = new Date(latest_time_stamp);

    const unicode_font_list = {{unicode_font_list | tojson}};
    // Number of elements in each row of the table
    let itemsPerRow = 8;
    // The results of the selections so far.
    let conversion_rules = [];

    let conversion_rules_updated = false;

    let hacked_cell_selected = null;
    let unicode_cells_selected = [];

    const hacked_ranges = {{hacked_ranges | tojson}};
    const best_match_data = {{best_matches_json.best_matches | tojson}};

    let hacked_char_to_cell = {};
    let conversions_by_hack_code = {};

    const font_a = '{{best_matches_json.font_a}}';
    const font_b = '{{best_matches_json.font_b}}';

    const hacked_code_defined_color = 'lightgray';

    let text_to_cell = {
      'hacked_font': {},
      'unicode_font': {}
    };

    let add_button = null;  // initialized on page load
    let rule_count = 0;
    // Append when a value needs to be reordered on conversion, e.g., U+1031
    const reorder_code = '\u200c';

    // From Gemini
    const range = (a, b) => Array.from({ length: b - a + 1 }, (_, i) => a + i);

    function initializePage() {
      let hacked_tds;
      let unicode_tds;
      hacked_tds = document.querySelectorAll('#hacked_font td');
      unicode_tds = document.querySelectorAll('#unicode_font td');
      setListener(hacked_tds, hacked_listener);
      setListener(unicode_tds, unicode_listener);

      set_font_ranges();

      add_button = document.getElementById('add_rule_button');
      load_rule_table(conversion_data);  // Initialize from previous rules.
    }

    function setListener(cells, handler) {
      cells.forEach(cell => {
        cell.addEventListener('click', (event) => {
          // Access the internal text of the specific clicked cell
          handler(cell);
      });

     window.addEventListener('beforeunload', (event) => {
        // Cancel the event as stated by the standard.
        if (conversion_rules_updated) {
            event.preventDefault();
        }

        // Older browsers require a returnValue to be set.
       event.returnValue = '';
       });
});
  }

    // Handle the clicks on table entries
    function hacked_listener(item) {
      alert('hacked =' + item.textContent);
    }
    function unicode_listener(item) {
      alert('unicode =' + item.textContent);
    }

    function set_font_ranges() {
      // Note that these values may have '0x' before them - OK for hex!
      const hacked_start = parseInt(document.getElementById('hacked_start').value, 16);
      const hacked_end = parseInt(document.getElementById('hacked_end').value, 16);
      const unicode_start = parseInt(document.getElementById('unicode_start').value, 16);
      const unicode_end = parseInt(document.getElementById('unicode_end').value, 16);

      // TODO: Start parsing for ranges and single values
      // e.g., '40-7f,131,2219' --> a range plus two single values
      // 1. Split by comma and space
      // 2. For each split, if not empty, check for '-'.
      //   a. Yes --> split by '-', then add code points from start and end, converted from hex
      //   b. No --> add single code point, converting from hex
      // NOTE: accept 0x or U+ or \u at the start of hex value

      if (hacked_ranges) {
        load_table_with_font_from_list('hacked_font', hacked_ranges);
      } else {
        load_table_with_font('hacked_font', hacked_start, hacked_end);
      }
      load_table_with_font('unicode_font', unicode_start, unicode_end);
    }

    let possible_cells = [];

    function clear_possible_colors() {
      for (const cell of possible_cells) {
        cell.style.backgroundColor = 'white';
      }
      possible_cells = [];
    }

    function hacked_cell_click_fn(cell) {
      if (cell.style.backgroundColor == 'lightgreen') {
        // Deselect
        cell.style.backgroundColor = 'white';
        hacked_cell_selected = null;
      } else {
        if (hacked_cell_selected) {
          // Deselect other one
          hacked_cell_selected.style.backgroundColor = 'white';
        }
        cell.style.backgroundColor = 'lightgreen';
        hacked_cell_selected = cell;
        const code = cell.textContent;
        // Clear all those with 'lavender' background
        clear_possible_colors();

        // Show the possible ones.
        const possibles = best_match_data[code];
        let count = 0;
        for (const item of possibles) {
          let possible_code = item[0].codePointAt(0);
          let cell = text_to_cell['unicode_font'][possible_code];
          let color = 'lavender';
          if (count == 0) { color = 'plum'; }
          if (cell) {
            cell.style.backgroundColor = color;
            possible_cells.push(cell);
          }
          count ++;
        };
      }
    }

    function unicode_cell_click_fn(cell) {
        // Clear all those with 'lavender' background
        clear_possible_colors();

        if (cell.style.backgroundColor == 'lightblue') {
        // Deselect
        cell.style.backgroundColor = 'white';
        // Remove from list of unicode conversions
        const index = unicode_cells_selected.indexOf(cell);
        if (index > -1) {
          unicode_cells_selected.splice(index, 1); // Modifies the original array, removing 1 item at 'index'
        }
      } else {
        cell.style.backgroundColor = 'lightblue';
        unicode_cells_selected.push(cell);
      }

      if (hacked_cell_selected && unicode_cells_selected.length > 0) {
        add_button.disabled = false;
      } else {
        add_button.disabled = true;
      }

      // Clear all those with 'lavender' background
      clear_possible_colors()
    }

    function load_table_with_font_from_list(table_id, codepoint_list) {
      load_table_with_font(table_id, codepoint_list);
    }

    function load_table_with_font(table_id, start, end) {
      // Get the font
      // Remove current table contents
      let tableBody = document.querySelector('#' + table_id + ' tbody');
      if (tableBody) {
        let row_count = tableBody.rows.length;
        for (let row in tableBody.rows) {
          if (row_count >= 1) {
            tableBody.deleteRow(-1);
          }
          row_count -= 1;
       }
      }

      // Create an array from input values
      let itemsArray;
      if (Array.isArray(start)) {
          // Create an array from start to end
          itemsArray = start.map(code => code.codePointAt(0));
      } else {
         itemsArray = range(start, end);
      }

      // Code from Gemini
      // Loop over start to end, creating new tds with
      // new row every row_size items
        const table = document.getElementById(table_id);
        // Use tbody if it exists, otherwise fallback to the table itself
        tableBody = table.querySelector('tbody') || table;

        let currentRow = null;

        itemsArray.forEach((itemText, index) => {
            // Create a new row at the start, or whenever we hit a multiple of M
            if (index % itemsPerRow === 0) {
                currentRow = document.createElement('tr');
                tableBody.appendChild(currentRow);
            }

            // Create the cell (td) and append it to the current row
            const td = document.createElement('td');
            td.textContent = String.fromCodePoint(itemText);
            td.title = td.textContent + '==  (0x' + itemText.toString(16) + ')';
            currentRow.appendChild(td);

            // Set up onclick functions
            if (table_id == 'hacked_font') {
                td.addEventListener("click", function() {
                  hacked_cell_click_fn(td);
                });
                td.style.fontFamily = '{{hacked_font_name}}';
                // Remember the cells that are set
                hacked_char_to_cell[td.textContent] = td;
            } else {
                td.addEventListener("click", function() {
                  unicode_cell_click_fn(td);
                });
                td.style.fontFamily = '{{unicode_font_name}}';
            }
            // Record where the code is stored for quick access.
            text_to_cell[table_id][itemText] = td;
      });

      // Set text to be the character with the code, and
      // and add the code point in hex too.
    }

    function load_rule_table(loaded_conversion_data) {
      // Load with the pre-loaded conversion rules.
      rule_count = 0;  // Don't overwrite the headers.
      const rule_table = document.getElementById('rule_table');
      // Clear current contents.
      // rule_table.innerHTML = '';

      const loaded_rules = loaded_conversion_data['conversion_rules'];
      for (const [key, value] of Object.entries(loaded_rules))  {
        add_conversion_rule_to_table(key, value);

        // Highlight the data in the hacked font table for those that
        // are already defined.
      }
    }

    function write_selection_to_rules() {
      const rule_table = document.getElementById('rule_table');
      let values = [];
      for (cell of unicode_cells_selected) {
        values.push(cell.textContent);
        cell.style.backgroundColor = 'white';
      }
      const reorder_item = document.getElementById('reorder_flag');
      add_conversion_rule_to_table(hacked_cell_selected.textContent, values,
        reorder_item.checked);
      // Clear the selections
      // Mark the hacked code visibly as defined already.
      hacked_cell_selected.style.backgroundColor = hacked_code_defined_color;
      hacked_cell_selected = null;

      unicode_cells_selected = [];
      add_rule_button.disabled = true;

      // Remember that there's something new.
      conversion_rules_updated = true;
    }

    function add_conversion_rule_to_table(key, values, reorder_flag) {
      const rule_table = document.getElementById('rule_table');

      if (Object.hasOwn(conversions_by_hack_code, key)) {
        const text = 'There is already a rule for ' + key + ' : ' +
            conversions_by_hack_code[key] + '\nAdd new?';
        if (! confirm(text)) {
          alert('Cancelled');
        }
      }

      // Add a row to the table
      rule_count += 1;
      const newRow = rule_table.insertRow(-1);
      const cell1 = newRow.insertCell(0);
      cell1.textContent = rule_count;

      const cell2 = newRow.insertCell(1);
      cell2.textContent = key;
      const code_point = cell2.textContent.codePointAt(0)
      cell2.title = cell2.textContent + ' ==  (0x' + code_point.toString(16) + ')';
      cell2.style.fontFamily = '{{hacked_font_name}}';

      const cell3 = newRow.insertCell(2);
      // Assemble the text from the output cells selected
      cell3.style.fontFamily = '{{unicode_font_name}}';

      // compute the hex for each code point and concatenate
      let rule_output = '';
      let hex_output = '';
      for (const value of values) {
        rule_output += value;
        const code_point = value.codePointAt(0)
        hex_output += '0x' + value.toString(16) + ' ';
      }
      cell3.title = hex_output;

      const cell4 = newRow.insertCell(3);
      if (reorder_flag) {
        const reorder_code = '\u200c';
        rule_output += reorder_code;
        hex_output += '0x' + 0x200c.toString(16) + ' ';

        cell4.textContent = "yes";
        cell4.style.backgroundColor = 'lightsalmon';
      }

      cell3.textContent = rule_output;
      conversions_by_hack_code[key] = rule_output;

      clear_possible_colors();

      // Add way to delete this one.
      const cell5 = newRow.insertCell(4);
      let button = document.createElement('button');
      button.type = 'button';
      button.innerText = 'Delete';
      button.className = 'btn-danger';
      button.onclick = (function(entry) { delete_rule(rule_table, newRow); } );
      // Append the delete button to the td cell
      cell5.appendChild(button);

      // Reset the color of the item to defined.
      hacked_cell = hacked_char_to_cell[key];
      if (hacked_cell) {
        hacked_cell.style.backgroundColor = hacked_code_defined_color;
      }
    }

    // Click on rule # to delete
    function delete_rule(rule_table, row_object) {
      let text = "Delete this row?";
      let index_to_remove = row_object.rowIndex;
      const hacked_code = row_object.cells[0].textContent
      if (confirm(text)) {
        let row_number = parseInt(row_object.cells[0].textContent);
        rule_table.deleteRow(index_to_remove);
        // rule_count -= 1;
      } else {
        // alert("No change made");
      }

      // Reset the color of the item to defined.
      hacked_cell = hacked_char_to_cell[hacked_code];
      if (hacked_cell) {
        hacked_cell.style.backgroundColor = white;
      }
    }

    function save_rules_to_server() {
      const rule_table = document.getElementById('rule_table');

      let rules_text = '';
      let rules_dictionary = {};
      let row_count = 0;
      for (const row of rule_table.rows) {
        let row_text = '';
        const cells = row.cells;
        if (row_count > 0) {
        rules_text += cells[0].textContent + ': ' + cells[1].textContent + ' --> ' +
          cells[2].textContent + '\n';

          rules_dictionary[cells[1].textContent] = cells[2].textContent;
          // TODO: keep information about reordering.
        }
        row_count += 1;
      }

      // Save the rules and write to a JSON structure
      const data_to_server = {
        'lang_code': lang_code,
        'lang_name': lang_name,
        'data_type': 'conversion_rules',
        'conversion_rules': rules_dictionary,
      };
      const number_of_rules = Object.keys(rules_dictionary).length;

      // Send the POST request to the Flask server
      const json_to_send = JSON.stringify(data_to_server);
        fetch('/save_matcher_conversion', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // Tells Flask that JSON is coming
            },
            body: json_to_send // Converts JS object to JSON string
        })
        .then(response => response.json()) // Parses the JSON response from Flask
        .then(data => {
            alert('Success storing ' + number_of_rules + ' conversion rules');
        })
        .catch(error => {
            alert('Error storing conversions:', error);
        });
      conversion_rules_updated = false;
    }
</script>

<body onload="initializePage()">

<h1>Hacked to Unicode</h1>

<label for="hacked_start">Hacked Start hex: </label>
<input type="text" id="hacked_start" name="hacked_start"value="0020">
<label for="hacked_end">End hex:</label>
<input type="text" id="hacked_end" name="hacked_end" value="007f">
<br />
<label for="unicode_start">Unicode Start hex:</label>
<input type="text" id="unicode_start" name="unicode_start" value="1000">
<label for="unicode_end">End hex:</label>
<input type="text" id="unicode_end" name="unicode_end" value="109f">

<br />

<input type="button" id="update_range" onclick="set_font_ranges();"
       value="Update font ranges">

<br />
<input type="checkbox" id="reorder_flag">Reorder?</input>

<table class="word-matrix" id="hacked_font">
    <caption>{{hacked_font_name}}</caption>

    <tr>
        <td><span class="hacked_font">A</span>
            <br />
        U+0041</td>
        <td>Banana</td>
        <td>Cherry</td>
    </tr>
    <tr>
        <td>Date</td>
        <td>Elderberry</td>
        <td>Fig</td>
    </tr>
</table>

<table class="word-matrix" id="unicode_font">
    <caption>{{unicode_font_name}}</caption>

    <tr>
        <td>U apple</td>
        <td>U Banana</td>
        <td>U Cherry</td>
    </tr>
    <tr>
        <td>U Date</td>
        <td>U Elderberry</td>
        <td>U Fig</td>
    </tr>
</table>

<div>
<input type="button" id="add_rule_button" onclick="write_selection_to_rules();"
       disabled="true" value="Add to rule list">
</div>
<input type="button" id="rule_to_text_button" onclick="save_rules_to_server();"
        value="Save rules">
</div>
<table class="word-matrix" id="rule_table">
    <caption>Convert rules</caption>
    <thead>
        <td>rule #</td>
        <td>old char</td>
        <td>new chars</td>
        <td>reorder?</td>
    </thead>

</table>

<br />
</body>
</html>
